name: auto-release

# Cuts a release of the mimalloc-pprof C amalgamation + crates.io publish.
#
# Trigger design (see rust/mimalloc-pprof/vendor/README.md for what gets shipped):
#   - workflow_dispatch: manual, explicit human/agent decision. Default `dry_run: true`
#     so this can be exercised safely (build + package + `cargo publish --dry-run`,
#     draft GitHub Release) without publishing anything for real.
#   - push tags `v*`: tagging a commit drives a REAL release (dry_run is forced off).
#     `cargo publish` fails loudly (not silently) if the crate version doesn't match
#     what's already on crates.io, so a re-run/duplicate tag push is a safe no-op-or-error,
#     not a silent re-publish.
#
# A real run (dry_run=false or tag push) does exactly one irreversible thing:
# `cargo publish -p mimalloc-pprof` to crates.io. Everything else (the GitHub Release,
# the ZIP) can be deleted/recreated by hand if needed.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build, package, and cargo publish --dry-run only -- no real publish, draft release"
        required: false
        type: boolean
        default: true
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel a real publish mid-flight

permissions:
  contents: write

env:
  # Tag pushes are always a real release; workflow_dispatch defers to the dry_run input
  # (which defaults to true, so manual runs are safe-by-default).
  IS_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}

jobs:
  build-and-package:
    name: Build, validate, package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: zackees/setup-soldr@v0
        with:
          toolchain-file: rust/rust-toolchain.toml
          lockfile: rust/Cargo.lock
          target-dir: rust/target
          build-cache-mode: full

      - name: xtask check (vendored C amalgamation must match src/include/)
        run: soldr cargo run -p xtask -- check

      - run: soldr cargo test --locked

      - name: cargo publish --dry-run (mimalloc-pprof)
        run: soldr cargo publish --dry-run -p mimalloc-pprof --locked

      # The vendor/ contents are identical across the matrix (xtask check above just
      # proved that); only one OS needs to actually produce the release ZIP.
      - name: Package release ZIP (vendor/ files only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          stage="$RUNNER_TEMP/mimalloc-pprof-c"
          mkdir -p "$stage"
          cp mimalloc-pprof/vendor/mimalloc-pprof-amalgamated.c "$stage/"
          cp mimalloc-pprof/vendor/mimalloc-pprof-amalgamated.h "$stage/"
          cp mimalloc-pprof/vendor/mimalloc.h "$stage/"
          cp mimalloc-pprof/vendor/mimalloc-stats.h "$stage/"
          cp mimalloc-pprof/vendor/README.md "$stage/"
          (cd "$stage" && zip -r "$RUNNER_TEMP/mimalloc-pprof-c.zip" .)
          mkdir -p dist
          cp "$RUNNER_TEMP/mimalloc-pprof-c.zip" dist/

      - name: Upload release ZIP artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mimalloc-pprof-c-zip
          path: rust/dist/mimalloc-pprof-c.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release + publish to crates.io
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: zackees/setup-soldr@v0
        with:
          toolchain-file: rust/rust-toolchain.toml
          lockfile: rust/Cargo.lock
          target-dir: rust/target
          build-cache-mode: full

      - name: Download release ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: mimalloc-pprof-c-zip
          path: dist

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches Cargo.toml version (tag-push releases only)
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(grep -m1 '^version' rust/mimalloc-pprof/Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (version $tag_version) does not match rust/mimalloc-pprof/Cargo.toml's version ($cargo_version). Refusing to publish a mismatched release -- fix the tag or bump Cargo.toml and re-tag."
            exit 1
          fi
          echo "tag version $tag_version matches Cargo.toml version $cargo_version"

      - name: Rename ZIP to versioned artifact name
        shell: bash
        run: |
          set -euo pipefail
          mv dist/mimalloc-pprof-c.zip "dist/mimalloc-pprof-c-${{ steps.tag.outputs.tag }}.zip"

      - name: cargo publish (mimalloc-pprof)
        if: env.IS_DRY_RUN != 'true'
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: soldr cargo publish -p mimalloc-pprof --locked

      - name: cargo publish --dry-run (mimalloc-pprof) [dry run]
        if: env.IS_DRY_RUN == 'true'
        working-directory: rust
        run: soldr cargo publish --dry-run -p mimalloc-pprof --locked

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: mimalloc-pprof ${{ steps.tag.outputs.tag }}
          draft: ${{ env.IS_DRY_RUN == 'true' }}
          files: dist/mimalloc-pprof-c-${{ steps.tag.outputs.tag }}.zip
