name: c-unit

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - '.github/workflows/c-unit.yml'

jobs:
  ctest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: cmake -B build -DMI_PPROF=ON
      - run: cmake --build build --config Release
      - run: ctest --test-dir build -C Release --output-on-failure

  ctest-pprof-off:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -B build -DMI_PPROF=OFF && cmake --build build && ctest --test-dir build --output-on-failure

  ctest-debug-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -B build -DMI_DEBUG_FULL=ON && cmake --build build && ctest --test-dir build --output-on-failure

  ctest-win-gnu:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
      - run: cmake -B build -G Ninja -DMI_PPROF=ON
      - run: cmake --build build
      - run: ctest --test-dir build --output-on-failure
